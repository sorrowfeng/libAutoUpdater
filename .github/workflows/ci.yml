name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DLIBAUTOUPDATER_BUILD_EXAMPLES=ON
          -DLIBAUTOUPDATER_BUILD_TESTS=ON
          -DLIBAUTOUPDATER_BUILD_UPDATER=ON
          -DLIBAUTOUPDATER_WITH_QT=OFF
          -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Validate Python Tools
        run: python -m py_compile tools/make_manifest.py tools/make_index.py tools/sign_manifest.py

      - name: Validate Packaging Tools
        run: |
          mkdir -p packaging-probe/release/bin
          printf 'probe' > packaging-probe/release/bin/app.txt
          python tools/make_manifest.py packaging-probe/release \
            --app-id com.example.probe \
            --platform "$RUNNER_OS" \
            --arch x64 \
            --version 1.2.3 \
            --release-date 2026-06-01T10:00:00Z \
            --base-url https://example.com/releases/1.2.3/
          python tools/make_index.py \
            --app-id com.example.probe \
            --channel stable \
            --generated-at 2026-06-01T10:00:00Z \
            --target "$RUNNER_OS"/x64=https://example.com/releases/1.2.3/manifest.json \
            --output packaging-probe/index.json
        shell: bash

      - name: Install Probe
        run: cmake --install build --config Debug --prefix install-probe

      - name: Consumer Probe Configure
        run: cmake -S tests/consumer -B consumer-build -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install-probe" -DCMAKE_BUILD_TYPE=Debug

      - name: Consumer Probe Build
        run: cmake --build consumer-build --config Debug --parallel

      - name: Consumer Probe Run
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./consumer-build/Debug/libAutoUpdater_consumer_probe.exe
          else
            ./consumer-build/libAutoUpdater_consumer_probe
          fi
        shell: bash
