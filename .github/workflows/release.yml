name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DLIBAUTOUPDATER_BUILD_EXAMPLES=OFF
          -DLIBAUTOUPDATER_BUILD_TESTS=OFF
          -DLIBAUTOUPDATER_BUILD_UPDATER=ON
          -DLIBAUTOUPDATER_WITH_QT=OFF
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --config Release --prefix install-package

      - name: Archive
        shell: bash
        run: |
          mkdir -p artifacts
          archive="artifacts/libAutoUpdater-${GITHUB_REF_NAME}-${RUNNER_OS}.zip"
          cmake -E tar cfv "$archive" --format=zip install-package
          python - "$archive" <<'PY'
          import hashlib
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          digest = hashlib.sha256(path.read_bytes()).hexdigest()
          path.with_suffix(path.suffix + ".sha256").write_text(
              f"{digest}  {path.name}\n",
              encoding="ascii",
          )
          PY

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ runner.os }}
          path: artifacts/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [package]

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          mapfile -t files < <(find release-artifacts -type f | sort)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" --verify-tag --generate-notes
          fi
